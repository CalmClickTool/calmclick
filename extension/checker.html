<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CalmClick check</title>
  <link rel="stylesheet" href="checker.css" />
</head>
<body>
  <header class="top">
    <div class="brand"><span class="mark">✓</span> CalmClick</div>
    <p class="sub">Private check on your device · we don’t upload what you check</p>
  </header>
  <main class="wrap">
    <div id="rulesLine" class="rules-line">Loading…</div>
    <div id="status" class="status">Checking…</div>
    <div id="result" class="result" hidden></div>
    <p class="footer-note">
      CalmClick is a helper, not a guarantee. When money or passwords are involved,
      verify with the company using a number you already trust.
      <br />
      Full website &amp; offline download:
      <a href="https://calmclicktool.github.io/calmclick/" target="_blank" rel="noopener">calmclicktool.github.io/calmclick</a>
    </p>
  </main>
  <script src="config-ext.js"></script>
  <script src="bundled-rules.js"></script>
  <script src="rules-engine.js"></script>
  <script src="checker.js"></script>
</body>
</html>
